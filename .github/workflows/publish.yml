name: Publish Bottles

on:
  release:
    types:
      - published
  workflow_dispatch:

jobs:
  publish-bottles:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-13
          - macos-14
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - name: Checkout tap
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Build and publish bottles
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ROOT_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}"
          brew test-bot \
            --only-formulae \
            --tap="${GITHUB_REPOSITORY}" \
            --testing-formulae=dw-cli \
            --root-url="${ROOT_URL}" \
            --git-name="${GITHUB_ACTOR}" \
            --git-email="${GITHUB_ACTOR}@users.noreply.github.com" \
            --publish \
            --skip-dependents \
            --skip-online-checks \
            --verbose
